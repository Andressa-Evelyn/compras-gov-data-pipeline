
services:
  # 1. PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: postgres-rpa
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_wal_senders=4", "-c", "max_replication_slots=4"]
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. Apache Kafka
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-rpa
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'

  # 3. Debezium Connect
  debezium:
    image: debezium/connect:2.4
    container_name: debezium-rpa
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: my_connect_configs
      OFFSET_STORAGE_TOPIC: my_connect_offsets
      STATUS_STORAGE_TOPIC: my_connect_statuses
    depends_on:
      - postgres
      - kafka

  # 4. ClickHouse
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: clickhouse-rpa
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  # 5, 6, 7. Airflow (Init, Webserver, Scheduler)
  airflow-init:
    image: apache/airflow:2.7.1-python3.10
    container_name: airflow-init
    entrypoint: /bin/bash
    command: -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@example.com"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - AIRFLOW__WEBSERVER__SECRET_KEY=uma_chave_secreta_muito_segura_123456 
    depends_on:
      - postgres

  airflow-webserver:
    image: apache/airflow:2.7.1-python3.10
    container_name: airflow-webserver
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://andressa:senha123@postgres:5432/banco_de_dados
      - _PIP_ADDITIONAL_REQUIREMENTS=pandas clickhouse-connect
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    command: webserver
    depends_on:
      - airflow-init

  airflow-scheduler:
    image: apache/airflow:2.7.1-python3.10
    container_name: airflow-scheduler
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      - _PIP_ADDITIONAL_REQUIREMENTS=pandas clickhouse-connect
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    command: scheduler
    depends_on:
      - airflow-init

  # 8. Apache Superset
  superset:
    image: apache/superset:3.1.0
    container_name: superset-rpa
    ports:
      - "8088:8088"
    user: "root"
    environment:
      - SUPERSET_SECRET_KEY= ${SUPERSET_SECRET_KEY}
    command: >
      bash -c "pip install clickhouse-connect && 
               superset db upgrade && 
               superset fab create-admin --username admin --firstname Admin --lastname Admin --email admin@admin.com --password admin && 
               superset init && 
               /usr/bin/run-server.sh"
    volumes:
      - superset_home:/app/superset_home
    depends_on:
      - clickhouse

volumes:
  pgdata:
  superset_home: